<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treino da Mamãe da Doca 🐶</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* Garante que as imagens dos exercícios sejam exibidas por completo, sem cortes */
    .exercise-image {
      object-fit: contain;
      max-height: 280px;
      width: 100%;
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen">
  <div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-2xl overflow-hidden flex flex-col"></div>

  <script>
    // ============================================================
    // DADOS DO APLICATIVO
    // ============================================================
    const workouts = [
      {
        id: 'A',
        name: 'Treino A — Membros Inferiores',
        icon: 'flame',
        exercises: [
          { name: 'Agachamento Livre', image: 'imagens/agachamento livre.PNG', sets: 3, reps: '12' },
          { name: 'Leg Press', image: 'imagens/leg press.PNG', sets: 3, reps: '12' },
          { name: 'Cadeira Extensora', image: 'imagens/cadeira extensora.PNG', sets: 3, reps: '15' },
          { name: 'Mesa Flexora', image: 'imagens/mesa flexora.PNG', sets: 3, reps: '15' },
          { name: 'Cadeira Abdutora', image: 'imagens/cadeira abdutora.PNG', sets: 3, reps: '15' },
          { name: 'Panturrilha em Pé', image: 'imagens/panturrilha em pe.PNG', sets: 3, reps: '20' }
        ]
      },
      {
        id: 'B',
        name: 'Treino B — Membros Superiores',
        icon: 'dumbbell',
        exercises: [
          { name: 'Supino Reto', image: 'imagens/supino reto.PNG', sets: 3, reps: '12' },
          { name: 'Desenvolvimento com Halteres', image: 'imagens/desenvolvimento com halteres.PNG', sets: 3, reps: '12' },
          { name: 'Remada Baixa', image: 'imagens/remada baixa.PNG', sets: 3, reps: '12' },
          { name: 'Rosca Direta', image: 'imagens/rosca direta.PNG', sets: 3, reps: '12' },
          { name: 'Tríceps Corda', image: 'imagens/triceps corda.PNG', sets: 3, reps: '15' },
          { name: 'Desenvolvimento Arnold', image: 'imagens/desenvolvimento arnold.PNG', sets: 3, reps: '12' }
        ]
      }
    ];

    // Estado global da aplicação
    let state = {
      view: 'home', // home | workout | exercise
      selectedWorkout: null,
      currentExerciseIndex: 0,
      completedSets: {}, // chave: "exercicioIndex", valor: número de séries concluídas
      weeklyFrequency: [], // array de datas ISO (YYYY-MM-DD) concluídas
      restTime: 60,
      restActive: false,
      restInterval: null,
      totalTime: 0,
      totalTimer: null
    };

    const app = document.getElementById('app');

    // ============================================================
    // UTILITÁRIOS
    // ============================================================

    // Carrega estado do localStorage
    function loadState() {
      const saved = localStorage.getItem('treinoDocaState');
      if (saved) {
        const parsed = JSON.parse(saved);
        state.weeklyFrequency = parsed.weeklyFrequency || [];
      }
    }

    // Salva estado no localStorage
    function saveState() {
      localStorage.setItem('treinoDocaState', JSON.stringify({
        weeklyFrequency: state.weeklyFrequency
      }));
    }

    // Retorna a data de hoje no formato ISO (YYYY-MM-DD)
    function todayISO() {
      return new Date().toISOString().split('T')[0];
    }

    // Retorna os últimos 7 dias (incluindo hoje)
    function lastSevenDays() {
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        days.push(d.toISOString().split('T')[0]);
      }
      return days;
    }

    // Formata segundos em mm:ss
    function formatTime(seconds) {
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = (seconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    // Toca bipe sonoro via Web Audio API
    function playBeep() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.4);
      } catch (e) {
        console.error('Erro ao tocar bipe:', e);
      }
    }

    // ============================================================
    // NAVEGAÇÃO
    // ============================================================
    function setView(viewName) {
      state.view = viewName;
      render();
    }

    function selectWorkout(workoutId) {
      state.selectedWorkout = workouts.find(w => w.id === workoutId);
      state.currentExerciseIndex = 0;
      state.completedSets = {};
      state.totalTime = 0;
      clearInterval(state.totalTimer);
      state.totalTimer = setInterval(() => {
        state.totalTime++;
        if (state.view === 'workout' || state.view === 'exercise') {
          updateTotalTimerDisplay();
        }
      }, 1000);
      setView('workout');
    }

    function selectExercise(index) {
      state.currentExerciseIndex = index;
      setView('exercise');
    }

    function backToHome() {
      // Para o cronômetro total ao voltar para a home (treino finalizado ou cancelado)
      clearInterval(state.totalTimer);
      setView('home');
    }

    // Integração com o botão voltar do navegador (History API)
    function pushHistory() {
      history.pushState({ view: state.view }, '');
    }

    window.addEventListener('popstate', () => {
      if (state.view === 'exercise') {
        setView('workout');
      } else if (state.view === 'workout') {
        backToHome();
      }
    });

    // ============================================================
    // CHECKLIST DE FREQUÊNCIA SEMANAL
    // ============================================================
    function toggleDay(date) {
      if (state.weeklyFrequency.includes(date)) {
        state.weeklyFrequency = state.weeklyFrequency.filter(d => d !== date);
      } else {
        state.weeklyFrequency.push(date);
      }
      saveState();
      render();
    }

    // ============================================================
    // CRONÔMETRO DE DESCANSO
    // ============================================================
    function startRest() {
      if (state.restActive) return;
      state.restActive = true;
      state.restTime = 60;
      clearInterval(state.restInterval);
      state.restInterval = setInterval(() => {
        state.restTime--;
        if (state.restTime <= 0) {
          playBeep();
          clearInterval(state.restInterval);
          state.restActive = false;
        }
        updateRestDisplay();
      }, 1000);
      updateRestDisplay();
    }

    function skipRest() {
      clearInterval(state.restInterval);
      state.restActive = false;
      state.restTime = 0;
      updateRestDisplay();
    }

    function addRest10() {
      state.restTime += 10;
      updateRestDisplay();
    }

    function updateRestDisplay() {
      const restEl = document.getElementById('restTimer');
      if (restEl) restEl.textContent = formatTime(state.restTime);
    }

    // ============================================================
    // SÉRIES E AVANÇO
    // ============================================================
    function toggleSet(exerciseIndex) {
      const current = state.completedSets[exerciseIndex] || 0;
      const maxSets = state.selectedWorkout.exercises[exerciseIndex].sets;
      if (current < maxSets) {
        state.completedSets[exerciseIndex] = current + 1;
      } else {
        state.completedSets[exerciseIndex] = 0;
      }
      render();
    }

    function allSetsCompleted() {
      const ex = state.selectedWorkout.exercises[state.currentExerciseIndex];
      return (state.completedSets[state.currentExerciseIndex] || 0) >= ex.sets;
    }

    function advanceExercise() {
      if (!allSetsCompleted()) return;
      if (state.currentExerciseIndex < state.selectedWorkout.exercises.length - 1) {
        selectExercise(state.currentExerciseIndex + 1);
      } else {
        // Último exercício: marca treino de hoje como concluído e volta para home
        if (!state.weeklyFrequency.includes(todayISO())) {
          state.weeklyFrequency.push(todayISO());
          saveState();
        }
        clearInterval(state.totalTimer);
        alert('Parabéns, Mamãe da Doca! 🐶 Treino finalizado com sucesso!');
        setView('home');
      }
    }

    // ============================================================
    // RENDERIZAÇÃO
    // ============================================================
    function render() {
      app.innerHTML = '';
      if (state.view === 'home') {
        renderHome();
      } else if (state.view === 'workout') {
        renderWorkout();
      } else if (state.view === 'exercise') {
        renderExercise();
      }
      lucide.createIcons();
    }

    function updateTotalTimerDisplay() {
      const totalEl = document.getElementById('totalTimer');
      if (totalEl) totalEl.textContent = formatTime(state.totalTime);
    }

    // TELA INICIAL: cabeçalho, checklist semanal e seleção de treino
    function renderHome() {
      const days = lastSevenDays();
      const dayNames = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
      const today = todayISO();

      const checklistHtml = days.map(date => {
        const d = new Date(date);
        const dayName = dayNames[d.getDay()];
        const isToday = date === today;
        const checked = state.weeklyFrequency.includes(date);
        return `
          <button
            onclick="toggleDay('${date}')"
            class="flex flex-col items-center justify-center w-12 h-16 rounded-xl border-2 transition ${
              checked
                ? 'bg-emerald-500 border-emerald-500 text-white'
                : 'bg-white border-slate-200 text-slate-600 hover:border-emerald-400'
            } ${isToday ? 'ring-2 ring-emerald-300' : ''}"
          >
            <span class="text-xs font-semibold">${dayName}</span>
            <span class="text-lg">${checked ? '<i data-lucide="check" class="w-5 h-5"></i>' : d.getDate()}</span>
          </button>
        `;
      }).join('');

      const cardsHtml = workouts.map(w => `
        <button
          onclick="selectWorkout('${w.id}')"
          class="w-full bg-gradient-to-br from-indigo-500 to-purple-600 text-white rounded-2xl p-6 shadow-lg hover:shadow-xl transition flex items-center justify-between group"
        >
          <div class="text-left">
            <p class="text-sm opacity-90 mb-1">Iniciar</p>
            <h3 class="text-2xl font-bold">${w.name}</h3>
          </div>
          <div class="bg-white/20 p-4 rounded-full group-hover:scale-110 transition">
            <i data-lucide="${w.icon}" class="w-8 h-8"></i>
          </div>
        </button>
      `).join('');

      app.innerHTML = `
        <header class="bg-indigo-600 text-white p-6 rounded-b-3xl shadow-md">
          <div class="flex items-center gap-3">
            <div class="bg-white/20 p-3 rounded-full">
              <i data-lucide="dumbbell" class="w-8 h-8"></i>
            </div>
            <div>
              <h1 class="text-2xl font-bold">Treino da Mamãe da Doca 🐶</h1>
              <p class="text-indigo-100 text-sm">Sua evolução, um dia de cada vez</p>
            </div>
          </div>
        </header>

        <main class="p-5 space-y-6 flex-1">
          <section>
            <h2 class="text-lg font-bold text-slate-800 mb-3 flex items-center gap-2">
              <i data-lucide="calendar-check" class="w-5 h-5 text-indigo-500"></i>
              Frequência Semanal
            </h2>
            <div class="flex justify-between gap-1">
              ${checklistHtml}
            </div>
            <p class="text-xs text-slate-500 mt-2 text-center">Toque no dia para marcar o treino como feito.</p>
          </section>

          <section class="space-y-4">
            <h2 class="text-lg font-bold text-slate-800 mb-1">Escolha seu treino</h2>
            ${cardsHtml}
          </section>
        </main>
      `;
    }

    // TELA DE LISTA DE EXERCÍCIOS DO TREINO
    function renderWorkout() {
      const w = state.selectedWorkout;
      const exercisesHtml = w.exercises.map((ex, idx) => {
        const completed = state.completedSets[idx] || 0;
        const allDone = completed >= ex.sets;
        return `
          <button
            onclick="selectExercise(${idx})"
            class="w-full flex items-center gap-4 bg-white border ${allDone ? 'border-emerald-400 bg-emerald-50' : 'border-slate-200'} rounded-xl p-4 shadow-sm hover:shadow-md transition"
          >
            <div class="w-12 h-12 rounded-full ${allDone ? 'bg-emerald-500 text-white' : 'bg-indigo-100 text-indigo-600'} flex items-center justify-center shrink-0">
              <span class="font-bold">${idx + 1}</span>
            </div>
            <div class="text-left flex-1">
              <h3 class="font-bold text-slate-800 ${allDone ? 'line-through text-slate-500' : ''}">${ex.name}</h3>
              <p class="text-sm text-slate-500">${ex.sets} séries x ${ex.reps} repetições</p>
            </div>
            <div class="text-right">
              <span class="text-sm font-bold ${allDone ? 'text-emerald-600' : 'text-indigo-600'}">${completed}/${ex.sets}</span>
            </div>
            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
          </button>
        `;
      }).join('');

      app.innerHTML = `
        <header class="bg-indigo-600 text-white p-5 shadow-md flex items-center justify-between sticky top-0 z-10">
          <div class="flex items-center gap-3">
            <button onclick="backToHome()" class="p-2 rounded-full hover:bg-white/20 transition">
              <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </button>
            <div>
              <h1 class="text-lg font-bold leading-tight">${w.name}</h1>
              <div class="flex items-center gap-1 text-indigo-100 text-sm">
                <i data-lucide="clock" class="w-4 h-4"></i>
                <span id="totalTimer">${formatTime(state.totalTime)}</span>
              </div>
            </div>
          </div>
          <div class="bg-white/20 p-2 rounded-full">
            <i data-lucide="${w.icon}" class="w-6 h-6"></i>
          </div>
        </header>

        <main class="p-5 space-y-4 flex-1 overflow-y-auto">
          ${exercisesHtml}
        </main>
      `;
    }

    // TELA DE EXERCÍCIO INDIVIDUAL
    function renderExercise() {
      const w = state.selectedWorkout;
      const ex = w.exercises[state.currentExerciseIndex];
      const completed = state.completedSets[state.currentExerciseIndex] || 0;
      const allDone = completed >= ex.sets;

      const setsHtml = Array.from({ length: ex.sets }).map((_, i) => {
        const done = i < completed;
        return `
          <button
            onclick="toggleSet(${state.currentExerciseIndex})"
            class="w-14 h-14 rounded-full border-2 flex items-center justify-center text-xl font-bold transition ${
              done
                ? 'bg-emerald-500 border-emerald-500 text-white'
                : 'bg-white border-slate-300 text-slate-400 hover:border-indigo-400'
            }"
          >
            ${done ? '<i data-lucide="check" class="w-7 h-7"></i>' : i + 1}
          </button>
        `;
      }).join('');

      const progressPercent = (completed / ex.sets) * 100;

      app.innerHTML = `
        <header class="bg-indigo-600 text-white p-5 shadow-md flex items-center justify-between sticky top-0 z-10">
          <div class="flex items-center gap-3">
            <button onclick="setView('workout')" class="p-2 rounded-full hover:bg-white/20 transition">
              <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </button>
            <div>
              <h1 class="text-lg font-bold leading-tight">Treino ${w.id}</h1>
              <div class="flex items-center gap-1 text-indigo-100 text-sm">
                <i data-lucide="clock" class="w-4 h-4"></i>
                <span id="totalTimer">${formatTime(state.totalTime)}</span>
              </div>
            </div>
          </div>
          <div class="bg-white/20 p-2 rounded-full">
            <i data-lucide="${w.icon}" class="w-6 h-6"></i>
          </div>
        </header>

        <main class="p-5 space-y-5 flex-1 overflow-y-auto">
          <div class="text-center">
            <p class="text-sm text-slate-500 mb-1">Exercício ${state.currentExerciseIndex + 1} de ${w.exercises.length}</p>
            <h2 class="text-2xl font-bold text-slate-800">${ex.name}</h2>
            <p class="text-indigo-600 font-semibold mt-1">${ex.sets} séries x ${ex.reps} repetições</p>
          </div>

          <!-- Imagem do exercício: exibida por completo, sem cortes -->
          <div class="bg-slate-50 rounded-2xl p-4 flex items-center justify-center shadow-inner">
            <img
              src="${ex.image}"
              alt="${ex.name}"
              class="exercise-image rounded-xl"
              onerror="this.src='https://placehold.co/400x280?text=Imagem+Indisponível'; this.classList.add('bg-slate-100')"
            />
          </div>

          <!-- Barra de progresso -->
          <div class="w-full bg-slate-200 rounded-full h-3 overflow-hidden">
            <div class="bg-indigo-500 h-3 rounded-full transition-all" style="width: ${progressPercent}%"></div>
          </div>

          <!-- Botões de série -->
          <div class="flex justify-center gap-3 flex-wrap">
            ${setsHtml}
          </div>
          <p class="text-center text-sm text-slate-500">Toque nos números para marcar cada série concluída.</p>

          <!-- Cronômetro de descanso -->
          <div class="bg-slate-50 rounded-2xl p-5 text-center border border-slate-200">
            <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wide mb-2">Descanso</h3>
            <div id="restTimer" class="text-5xl font-mono font-bold text-indigo-600 mb-4">${formatTime(state.restTime)}</div>
            <div class="flex justify-center gap-3">
              <button onclick="startRest()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl font-semibold transition flex items-center gap-2">
                <i data-lucide="play" class="w-4 h-4"></i> Iniciar 1 min
              </button>
              <button onclick="addRest10()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-xl font-semibold transition flex items-center gap-2">
                <i data-lucide="plus" class="w-4 h-4"></i> 10s
              </button>
              <button onclick="skipRest()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-xl font-semibold transition flex items-center gap-2">
                <i data-lucide="skip-forward" class="w-4 h-4"></i> Pular
              </button>
            </div>
          </div>

          <!-- Botão de avançar (bloqueado até completar todas as séries) -->
          <button
            onclick="advanceExercise()"
            class="w-full py-4 rounded-xl font-bold text-lg transition flex items-center justify-center gap-2 ${
              allDone
                ? 'bg-emerald-500 hover:bg-emerald-600 text-white shadow-lg'
                : 'bg-slate-200 text-slate-400 cursor-not-allowed'
            }"
            ${allDone ? '' : 'disabled'}
          >
            ${state.currentExerciseIndex < w.exercises.length - 1
              ? '<span>Próximo Exercício</span><i data-lucide="arrow-right" class="w-5 h-5"></i>'
              : '<span>Finalizar Treino</span><i data-lucide="check-circle" class="w-5 h-5"></i>'
            }
          </button>
        </main>
      `;
    }

    // ============================================================
    // INICIALIZAÇÃO
    // ============================================================
    loadState();
    render();
    pushHistory();
  </script>
</body>
</html>
