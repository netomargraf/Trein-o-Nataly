<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treino da Mamãe da Doca 🐶</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .screen { display: none; flex-direction: column; }
    .screen.active { display: flex; }
    .img-exercise { object-fit: contain; background-color: #f8fafc; max-height: 280px; width: 100%; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">
  <!-- Tela Frequência Semanal -->
  <section id="screen-weekly" class="screen active p-6 max-w-md mx-auto">
    <div class="bg-white rounded-2xl shadow p-6 mb-4">
      <h1 class="text-2xl font-bold text-center mb-4"><i class="fa-solid fa-dog text-pink-500"></i> Treino da Mamãe da Doca 🐶</h1>
      <p class="text-center text-sm text-slate-500 mb-4">Marque os dias que você treinou esta semana</p>
      <div id="weekly-checklist" class="space-y-2">
        <!-- checklist via JS -->
      </div>
    </div>
    <div class="bg-white rounded-2xl shadow p-6">
      <h2 class="text-lg font-semibold mb-3"><i class="fa-solid fa-dumbbell text-indigo-500"></i> Escolha o treino</h2>
      <button onclick="startWorkout('A')" class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 rounded-xl mb-3 transition">
        <i class="fa-solid fa-person-walking"></i> Treino A
      </button>
      <button onclick="startWorkout('B')" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 rounded-xl transition">
        <i class="fa-solid fa-person-running"></i> Treino B
      </button>
    </div>
  </section>

  <!-- Tela Treino -->
  <section id="screen-workout" class="screen p-4 max-w-md mx-auto">
    <div class="bg-white rounded-2xl shadow p-4 mb-4 sticky top-0 z-10">
      <div class="flex justify-between items-center">
        <div>
          <h2 id="workout-title" class="text-xl font-bold">Treino A</h2>
          <p class="text-sm text-slate-500">Exercício <span id="ex-index">1</span> de <span id="ex-total">6</span></p>
        </div>
        <div class="text-right">
          <div class="text-xs text-slate-500">Tempo total</div>
          <div id="total-timer" class="text-xl font-mono font-bold text-slate-800">00:00</div>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow p-4 mb-4">
      <img id="ex-img" src="" alt="Exercício" class="img-exercise rounded-xl mb-4" />
      <h3 id="ex-name" class="text-2xl font-bold mb-2 text-center"></h3>
      <p id="ex-info" class="text-center text-slate-600 mb-4"></p>

      <div class="mb-4">
        <label class="block text-sm font-semibold mb-2">Séries concluídas</label>
        <div id="series-container" class="flex flex-wrap gap-2">
          <!-- series checkboxes -->
        </div>
      </div>

      <button id="btn-rest" onclick="startRest()" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 rounded-xl mb-3 transition">
        <i class="fa-solid fa-clock"></i> Descansar 1 min
      </button>
      <div id="rest-timer" class="hidden bg-slate-50 rounded-xl p-4 text-center mb-4">
        <div class="text-4xl font-mono font-bold mb-3" id="rest-display">01:00</div>
        <div class="flex gap-2 justify-center">
          <button onclick="skipRest()" class="bg-slate-300 hover:bg-slate-400 text-slate-800 font-bold py-2 px-4 rounded-lg"><i class="fa-solid fa-forward"></i> Pular</button>
          <button onclick="addRest(10)" class="bg-slate-300 hover:bg-slate-400 text-slate-800 font-bold py-2 px-4 rounded-lg"><i class="fa-solid fa-plus"></i> +10s</button>
        </div>
      </div>

      <button id="btn-next" onclick="nextExercise()" disabled class="w-full bg-slate-300 text-slate-500 font-bold py-3 rounded-xl transition">
        <i class="fa-solid fa-arrow-right"></i> Avançar
      </button>
    </div>

    <div class="flex justify-between">
      <button onclick="goBack()" class="text-slate-500 font-semibold py-2 px-4"><i class="fa-solid fa-chevron-left"></i> Voltar</button>
      <button onclick="finishWorkout()" class="text-pink-500 font-semibold py-2 px-4"><i class="fa-solid fa-flag-checkered"></i> Finalizar</button>
    </div>
  </section>

  <!-- Tela Final -->
  <section id="screen-finish" class="screen p-6 max-w-md mx-auto text-center">
    <div class="bg-white rounded-2xl shadow p-8">
      <i class="fa-solid fa-trophy text-6xl text-yellow-400 mb-4"></i>
      <h2 class="text-3xl font-bold mb-2">Treino concluído!</h2>
      <p class="text-slate-600 mb-4">Você treinou por <span id="finish-time" class="font-bold"></span></p>
      <button onclick="backToHome()" class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 rounded-xl transition">
        <i class="fa-solid fa-house"></i> Voltar ao início
      </button>
    </div>
  </section>

  <script>
    const treinos = {
      A: [
        { name: "Agachamento Livre", series: 3, reps: "12", img: "exercises/agachamento.png" },
        { name: "Levantamento Terra", series: 3, reps: "10", img: "exercises/terra.png" },
        { name: "Supino Reto", series: 3, reps: "12", img: "exercises/supino.png" },
        { name: "Remada Curvada", series: 3, reps: "12", img: "exercises/remada.png" },
        { name: "Desenvolvimento com Halteres", series: 3, reps: "10", img: "exercises/desenvolvimento.png" },
        { name: "Cadeira Extensora", series: 3, reps: "15", img: "exercises/cadeira.png" }
      ],
      B: [
        { name: "Agachamento Búlgaro", series: 3, reps: "10", img: "exercises/bulgaro.png" },
        { name: "Stiff", series: 3, reps: "12", img: "exercises/stiff.png" },
        { name: "Puxada Aberta", series: 3, reps: "12", img: "exercises/puxada.png" },
        { name: "Remada Unilateral", series: 3, reps: "12", img: "exercises/remada_unilateral.png" },
        { name: "Elevação Lateral", series: 3, reps: "15", img: "exercises/elevacao_lateral.png" },
        { name: "Rosca Direta", series: 3, reps: "12", img: "exercises/rosca.png" },
        { name: "Tríceps Testa", series: 3, reps: "12", img: "exercises/triceps.png" },
        { name: "Abdominal Crunch", series: 3, reps: "20", img: "exercises/crunch.png" }
      ]
    };

    let currentTreino = [];
    let currentIndex = 0;
    let completedSeries = 0;
    let totalSeconds = 0;
    let totalTimerInterval = null;
    let restSeconds = 0;
    let restInterval = null;
    let todayIndex = new Date().getDay();
    const weekDays = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0, 0);
    }

    function renderWeekly() {
      const container = document.getElementById('weekly-checklist');
      container.innerHTML = '';
      const saved = JSON.parse(localStorage.getItem('weeklyTreino') || '[]');
      weekDays.forEach((day, idx) => {
        const checked = saved.includes(idx) ? 'checked' : '';
        container.innerHTML += `
          <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-lg cursor-pointer">
            <input type="checkbox" onchange="toggleDay(${idx})" ${checked} class="w-5 h-5 accent-pink-500">
            <span class="font-medium">${day}</span>
          </label>
        `;
      });
    }

    function toggleDay(idx) {
      let saved = JSON.parse(localStorage.getItem('weeklyTreino') || '[]');
      if (saved.includes(idx)) saved = saved.filter(i => i !== idx);
      else saved.push(idx);
      localStorage.setItem('weeklyTreino', JSON.stringify(saved));
    }

    function startWorkout(type) {
      currentTreino = treinos[type];
      currentIndex = 0;
      completedSeries = 0;
      totalSeconds = 0;
      document.getElementById('workout-title').textContent = 'Treino ' + type;
      document.getElementById('ex-total').textContent = currentTreino.length;
      document.getElementById('total-timer').textContent = '00:00';
      clearInterval(totalTimerInterval);
      totalTimerInterval = setInterval(() => {
        totalSeconds++;
        const m = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
        const s = String(totalSeconds % 60).padStart(2, '0');
        document.getElementById('total-timer').textContent = `${m}:${s}`;
      }, 1000);
      history.pushState({ screen: 'workout' }, '', '#treino');
      showScreen('screen-workout');
      renderExercise();
    }

    function renderExercise() {
      const ex = currentTreino[currentIndex];
      document.getElementById('ex-index').textContent = currentIndex + 1;
      document.getElementById('ex-name').textContent = ex.name;
      document.getElementById('ex-info').textContent = `${ex.series} séries x ${ex.reps} repetições`;
      document.getElementById('ex-img').src = ex.img;
      document.getElementById('ex-img').alt = ex.name;
      completedSeries = 0;
      renderSeries();
      updateNextButton();
    }

    function renderSeries() {
      const ex = currentTreino[currentIndex];
      const container = document.getElementById('series-container');
      container.innerHTML = '';
      for (let i = 1; i <= ex.series; i++) {
        const checked = i <= completedSeries ? 'checked' : '';
        const bg = i <= completedSeries ? 'bg-pink-500 text-white' : 'bg-slate-200 text-slate-700';
        container.innerHTML += `
          <label class="flex items-center gap-2 px-4 py-2 rounded-lg cursor-pointer ${bg}">
            <input type="checkbox" onchange="toggleSeries(${i})" ${checked} class="w-5 h-5 accent-pink-500">
            <span class="font-bold">Série ${i}</span>
          </label>
        `;
      }
    }

    function toggleSeries(target) {
      completedSeries = target;
      renderSeries();
      updateNextButton();
    }

    function updateNextButton() {
      const ex = currentTreino[currentIndex];
      const btn = document.getElementById('btn-next');
      if (completedSeries >= ex.series) {
        btn.disabled = false;
        btn.classList.remove('bg-slate-300', 'text-slate-500');
        btn.classList.add('bg-pink-500', 'text-white', 'hover:bg-pink-600');
      } else {
        btn.disabled = true;
        btn.classList.add('bg-slate-300', 'text-slate-500');
        btn.classList.remove('bg-pink-500', 'text-white', 'hover:bg-pink-600');
      }
    }

    function startRest() {
      if (restInterval) clearInterval(restInterval);
      restSeconds = 60;
      document.getElementById('rest-timer').classList.remove('hidden');
      updateRestDisplay();
      restInterval = setInterval(() => {
        restSeconds--;
        updateRestDisplay();
        if (restSeconds <= 0) {
          beep();
          clearInterval(restInterval);
          document.getElementById('rest-timer').classList.add('hidden');
        }
      }, 1000);
    }

    function updateRestDisplay() {
      const m = String(Math.floor(restSeconds / 60)).padStart(2, '0');
      const s = String(restSeconds % 60).padStart(2, '0');
      document.getElementById('rest-display').textContent = `${m}:${s}`;
    }

    function skipRest() {
      clearInterval(restInterval);
      document.getElementById('rest-timer').classList.add('hidden');
    }

    function addRest(seconds) {
      restSeconds += seconds;
      updateRestDisplay();
    }

    function beep() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.5, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
      } catch (e) {
        console.warn('Beep failed', e);
      }
    }

    function nextExercise() {
      if (currentIndex < currentTreino.length - 1) {
        currentIndex++;
        renderExercise();
      } else {
        finishWorkout();
      }
    }

    function finishWorkout() {
      clearInterval(totalTimerInterval);
      clearInterval(restInterval);
      const m = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
      const s = String(totalSeconds % 60).padStart(2, '0');
      document.getElementById('finish-time').textContent = `${m}:${s}`;
      toggleDay(todayIndex);
      renderWeekly();
      history.pushState({ screen: 'finish' }, '', '#fim');
      showScreen('screen-finish');
    }

    function backToHome() {
      history.pushState({ screen: 'home' }, '', '#');
      showScreen('screen-weekly');
    }

    function goBack() {
      history.back();
    }

    window.addEventListener('popstate', function (e) {
      if (!e.state || e.state.screen === 'home') {
        showScreen('screen-weekly');
      } else if (e.state.screen === 'workout') {
        showScreen('screen-workout');
      } else if (e.state.screen === 'finish') {
        showScreen('screen-finish');
      } else {
        showScreen('screen-weekly');
      }
    });

    renderWeekly();
  </script>
</body>
</html>
